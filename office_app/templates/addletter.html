{% extends "layout.html" %}

{% block content %}

<div class="card">

<div class="card-header bg-primary text-white">

<h3>Add New Letter</h3>

</div>

<div class="card-body">

<form action="/saveletter" method="POST">

<div class="row">

<div class="col-md-6">

<label>Letter Number</label>

<input
type="text"
name="letter_no"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>Received Date</label>

<input
type="date"
name="received_date"
class="form-control">

</div>

</div>

<br>

<label>Subject</label>

<input
type="text"
name="subject"
class="form-control">

<br>

<label>Received From</label>

<input
type="text"
name="received_from"
class="form-control">

<br>

<div class="row">

<div class="col-md-4">

<label>Assign Employee</label>

<select
name="assigned_to"
class="form-select">

{% for e in employees %}

<option value="{{e.employee_id}}">

{{e.employee_name}}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-4">

<label>Priority</label>

<select
name="priority"
class="form-select">

<option>High</option>

<option>Medium</option>

<option>Low</option>

</select>

</div>

<div class="col-md-4">

<label>Status</label>

<select
name="status"
class="form-select">

<option>Pending</option>

<option>In Progress</option>

<option>Completed</option>

</select>

</div>

</div>

<br>

<label>Remarks</label>

<textarea
name="remarks"
class="form-control"
rows="4"></textarea>

<br>

<button
class="btn btn-success">

Save Letter

</button>

<a
href="/letters"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

{% endblock %}
