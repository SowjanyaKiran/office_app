{% extends "layout.html" %}

{% block content %}

<h2>Task Report</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>S.No</th>
<th>Employee</th>

<th>Task</th>

<th>Priority</th>

<th>Status</th>

<th>Due Date</th>

</tr>

</thead>

<tbody>

{% for t in tasks %}

<tr>

<td>{{ loop.index }}</td>
<td>{{t.employee_name}}</td>

<td>{{t.task_name}}</td>

<td>{{t.priority}}</td>

<td>{{t.status}}</td>

<td>{{t.due_date}}</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="{{ url_for('reports') }}" class="btn btn-secondary">
    <i class="bi bi-arrow-left"></i> Back to Reports
</a>

{% endblock %}
