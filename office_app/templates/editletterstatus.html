{% extends "layout.html" %}

{% block content %}

<div class="container">

<div class="card shadow mx-auto mt-4" style="max-width:600px;">

<div class="card-header bg-warning">

<h4>

<i class="bi bi-pencil-square"></i>

Update Letter Status

</h4>

</div>

<div class="card-body">

<form action="/updateletterstatus" method="POST">

<input type="hidden"
name="letter_id"
value="{{ letter.letter_id }}">

<div class="mb-3">

<label class="form-label">

Letter Number

</label>

<input
type="text"
class="form-control"
value="{{ letter.letter_no }}"
readonly>

</div>

<div class="mb-3">

<label class="form-label">

Subject

</label>

<input
type="text"
class="form-control"
value="{{ letter.subject }}"
readonly>

</div>

<div class="mb-3">

<label class="form-label">

Status

</label>

<select
name="status"
class="form-select"
required>

<option value="Pending"
{% if letter.status=="Pending" %}selected{% endif %}>
Pending
</option>

<option value="In Progress"
{% if letter.status=="In Progress" %}selected{% endif %}>
In Progress
</option>

<option value="Completed"
{% if letter.status=="Completed" %}selected{% endif %}>
Completed
</option>

</select>

</div>

<div class="text-end">

<a href="/letters"
class="btn btn-secondary">

Back

</a>

<button
type="submit"
class="btn btn-success">

Update Status

</button>

</div>



</form>

</div>

</div>

</div>

{% endblock %}
