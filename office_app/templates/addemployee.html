{% extends "layout.html" %}
{% block content %}

<h4 class="mb-4"><i class="bi bi-person-plus"></i> Add Employee</h4>

<div class="card p-4">
<form action="/saveemployee" method="POST" enctype="multipart/form-data">

    <div class="row g-3">

        <div class="col-md-4">
            <label class="form-label">Profile Picture</label>
            <input type="file" name="profile_picture" class="form-control" accept="image/*">
        </div>

        <div class="col-md-4">
            <label class="form-label">Employee Code</label>
            <input type="text" name="employee_code" class="form-control" placeholder="e.g. NIC-001" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Full Name</label>
            <input type="text" name="employee_name" class="form-control" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="form-label">Designation</label>
            <input type="text" name="designation" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="form-label">Qualification</label>
            <input type="text" name="qualification" class="form-control" placeholder="e.g. B.E. Computer Science">
        </div>

        <div class="col-md-4">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="form-label">Mobile</label>
            <input type="text" name="mobile" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="form-label">Blood Group</label>
            <select name="blood_group" class="form-select">
                <option value="">Select</option>
                <option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option>
                <option>O+</option><option>O-</option>
                <option>AB+</option><option>AB-</option>
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">Date of Birth</label>
            <input type="date" name="date_of_birth" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="form-label">Date of Joining</label>
            <input type="date" name="date_of_joining" class="form-control">
        </div>

        <div class="col-md-8">
            <label class="form-label">Address</label>
            <input type="text" name="address" class="form-control">
        </div>

        <div class="col-md-4">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="Active" selected>Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>

    </div>

    <button type="submit" class="btn btn-primary mt-4">
        <i class="bi bi-check-circle"></i> Save Employee
    </button>
    <a href="/employees" class="btn btn-secondary mt-4">Cancel</a>

</form>
</div>

{% endblock %}
